<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/images/favcon.png" />
  <title>Review Post — Shana Gates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bronze: #B8975A;
      --bg:     #0a0a0a;
      --surf:   #141414;
      --surf2:  #1c1c1c;
      --border: rgba(255,255,255,0.08);
      --text:   #fff;
      --muted:  rgba(255,255,255,0.45);
      --amber:  #f59e0b;
      --blue:   #3b82f6;
      --green:  #22c55e;
      --red:    #ef4444;
      --font:   system-ui, -apple-system, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* ── Top nav bar ── */
    .topbar {
      background: var(--surf); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 52px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .back-link {
      color: var(--muted); font-size: 13px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px; transition: color 0.15s;
    }
    .back-link:hover { color: var(--bronze); }
    .topbar-sep { width: 1px; height: 20px; background: var(--border); }
    .topbar-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 480px; }
    .status-pill {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 100px; flex-shrink: 0;
    }
    .status-media_pending { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
    .status-media_ready   { background: rgba(59,130,246,0.15);  color: var(--blue);  border: 1px solid rgba(59,130,246,0.3); }

    /* ── Editor grid ── */
    .editor-wrap { max-width: 1120px; margin: 0 auto; padding: 32px 24px 80px; }
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .editor-grid { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; margin-bottom: 16px;
    }
    .card:last-child { margin-bottom: 0; }
    .card-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }

    /* ── Article section ── */
    .meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .cat-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 100px;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
    }
    .post-date { font-size: 12px; color: var(--muted); }
    .title-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .title-input {
      flex: 1; background: transparent; border: none; border-bottom: 1px solid transparent;
      color: var(--text); font-size: 20px; font-weight: 700; line-height: 1.35;
      font-family: var(--font); padding: 2px 0; width: 100%;
      transition: border-color 0.15s;
    }
    .title-input:focus { outline: none; border-bottom-color: rgba(184,151,90,0.5); }
    .title-input:hover { border-bottom-color: var(--border); }
    .suggest-btn {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); padding: 5px 11px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: var(--font); flex-shrink: 0; margin-top: 2px;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .suggest-btn:hover:not(:disabled) { border-color: rgba(184,151,90,0.4); color: var(--text); }
    .suggest-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .title-suggestions {
      display: flex; flex-direction: column; gap: 6px; margin-top: 10px;
    }
    .suggestion-pill {
      background: var(--surf2); border: 1px solid var(--border); border-radius: 7px;
      padding: 9px 13px; font-size: 13px; color: rgba(255,255,255,0.75); cursor: pointer;
      text-align: left; font-family: var(--font); transition: border-color 0.15s, color 0.15s;
      line-height: 1.4;
    }
    .suggestion-pill:hover { border-color: rgba(184,151,90,0.4); color: var(--text); }
    .suggestion-pill.applied { border-color: var(--bronze); color: var(--text); }
    .post-excerpt { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 12px; margin-top: 10px; }
    .source-link { font-size: 12px; color: var(--bronze); text-decoration: none; }
    .source-link:hover { text-decoration: underline; }

    /* ── Caption section ── */
    .caption-hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
    .gen-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 7px;
      padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: border-color 0.15s, color 0.15s;
      display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px;
    }
    .gen-btn:hover:not(:disabled) { border-color: rgba(184,151,90,0.4); color: var(--text); }
    .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    textarea {
      width: 100%; background: var(--surf2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; color: var(--text);
      font-family: var(--font); font-size: 14px; line-height: 1.6;
      resize: vertical; min-height: 110px; transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: rgba(184,151,90,0.4); }
    .url-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* ── Thumbnail builder ── */
    .builder-sublabel { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .prompt-area {
      font-size: 13px; line-height: 1.65; min-height: 140px;
      color: rgba(255,255,255,0.7); font-family: 'Courier New', monospace;
    }
    .copy-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
    .copy-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 7px;
      padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: border-color 0.15s, color 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .copy-btn:hover { border-color: rgba(184,151,90,0.4); color: var(--text); }
    .copy-hint { font-size: 12px; color: var(--muted); }

    /* ── Right column: Thumbnail preview ── */
    .thumb-preview-wrap {
      width: 100%; aspect-ratio: 16/9; border-radius: 8px;
      background: var(--surf2); border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-preview-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-placeholder-inner { display: flex; flex-direction: column; align-items: center; gap: 8px; color: rgba(255,255,255,0.15); font-size: 13px; }
    .thumb-placeholder-inner svg { opacity: 0.3; }
    .upload-label {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 10px 16px; border-radius: 8px;
      background: var(--surf2); border: 1px solid var(--border);
      font-size: 13px; color: var(--muted); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .upload-label:hover { border-color: rgba(184,151,90,0.4); color: var(--text); }
    .upload-input { display: none; }
    .upload-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px; }

    /* ── Right column: Publish ── */
    .publish-card { position: sticky; top: 24px; }
    .publish-bullets { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 20px; }
    .publish-bullets ul { list-style: disc; padding-left: 18px; margin-top: 6px; }
    .publish-bullets p { margin-bottom: 4px; font-size: 13px; }
    .btn-publish {
      width: 100%; padding: 13px; border-radius: 8px;
      background: var(--green); color: #000;
      border: none; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: var(--font); display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s;
    }
    .btn-publish:hover:not(:disabled) { opacity: 0.85; }
    .btn-publish:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-mark-ready {
      width: 100%; padding: 11px; border-radius: 8px; margin-top: 10px;
      background: none; border: 1px solid rgba(245,158,11,0.4);
      color: var(--amber); font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: background 0.15s, border-color 0.15s;
    }
    .btn-mark-ready:hover:not(:disabled) { background: rgba(245,158,11,0.08); }
    .btn-mark-ready:disabled { opacity: 0.3; cursor: not-allowed; }
    .publish-prereq { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.5; }

    /* ── Feedback messages ── */
    .inline-error {
      font-size: 13px; color: var(--red); margin-top: 10px;
      padding: 8px 12px; background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2); border-radius: 6px;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px; border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000; border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    .spinner-muted {
      border-color: rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.5);
    }
    .spinner-green { border-color: rgba(0,0,0,0.15); border-top-color: #000; }

    /* ── Loading state ── */
    .loading-state { text-align: center; padding: 80px 24px; color: var(--muted); font-size: 14px; }

    /* ── Video script textarea ── */
    textarea.script-area {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px; line-height: 1.7; min-height: 180px;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.85);
    }

    /* ── Progress bar ── */
    .progress-wrap { margin-top: 12px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .progress-bar-bg { height: 5px; background: var(--surf2); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--bronze); border-radius: 99px; transition: width 0.3s; }

    /* ── Video panel states ── */
    .panel-info {
      padding: 14px 16px; border-radius: 8px; display: flex; align-items: flex-start; gap: 12px;
    }
    .panel-info.blue  { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); }
    .panel-info.green { background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.2); }
    .panel-info.amber { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); }
    .panel-info-icon  { font-size: 20px; flex-shrink: 0; }
    .panel-info-body  { flex: 1; min-width: 0; }
    .panel-info-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .panel-info.blue  .panel-info-title { color: var(--blue); }
    .panel-info.green .panel-info-title { color: var(--green); }
    .panel-info.amber .panel-info-title { color: var(--amber); }
    .panel-info-sub   { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* ── Platform status grid ── */
    .platform-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .platform-row  { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .platform-icon { font-size: 15px; flex-shrink: 0; width: 22px; text-align: center; }
    .platform-name { flex: 1; color: rgba(255,255,255,0.7); }
    .platform-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }
    .pstatus-polling { background: rgba(59,130,246,0.12); color: var(--blue); }
    .pstatus-done    { background: rgba(34,197,94,0.12);  color: var(--green); }
    .pstatus-error   { background: rgba(239,68,68,0.12);  color: var(--red); }
    .pstatus-idle    { background: rgba(255,255,255,0.05); color: var(--muted); }

    /* ── Step labels ── */
    .step-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <a class="back-link" href="/admin/va-queue/">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Queue
      </a>
      <div class="topbar-sep"></div>
      <div class="topbar-title" id="topbarTitle">Loading…</div>
    </div>
    <div class="status-pill status-media_pending" id="statusPill">Media Pending</div>
  </div>

  <div class="editor-wrap">
    <div id="loadingState" class="loading-state">Loading post…</div>
    <div id="editorGrid" class="editor-grid" style="display:none;"></div>
  </div>

  <script>
    if (!localStorage.getItem('sg_auth')) {
      window.location.href = '/admin/assistant/login.html'
    }

    const CATEGORY_LABELS = {
      'market-update':'Market Update','investor-tips':'Investor Tips','seller-tips':'Seller Tips',
      'local-happenings':'Local Happenings','trending-topics':'Trending Topics',
      'buying-tips':'Market Update','selling-tips':'Seller Tips','investment':'Investor Tips',
      'community-spotlight':'Local Happenings','local-area':'Local Happenings','news':'Trending Topics',
      'market-insight':'Market Update',
    }

    const slug = new URLSearchParams(location.search).get('slug')
    if (!slug) document.getElementById('loadingState').textContent = 'No slug provided.'

    let currentPost = null
    let pendingImageBase64 = null
    let pendingVideoUrl = null        // Vercel Blob URL after upload
    let heygenPollInterval = null     // polling timer for HeyGen status
    let publishPollTimers = {}        // per-platform Blotato poll timers

    // ── Global helpers (survive innerHTML reinsertion) ──────────────────────

    function updatePublishBullet() {
      const videoEl = document.getElementById('bulletVideo')
      if (videoEl) videoEl.style.display = pendingVideoUrl ? 'list-item' : 'none'
    }

    function clearSavedVideo() {
      pendingVideoUrl = null
      updatePublishBullet()
      const panel = document.getElementById('videoPanel')
      if (!panel) return
      panel.innerHTML = `<label class="upload-label" id="videoUploadLabel">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Video
          <input class="upload-input" type="file" id="videoInput" accept="video/mp4,video/quicktime,video/webm,video/x-m4v" onchange="handleVideoUpload(event)">
        </label>
        <div class="url-hint" style="margin-top:8px;">MP4, MOV, or WebM — up to 500 MB. Without a video, social posts will use the thumbnail image.</div>`
    }

    function resetHeygenPanel() {
      if (heygenPollInterval) { clearInterval(heygenPollInterval); heygenPollInterval = null }
      const panel = document.getElementById('heygenPanel')
      if (!panel) return
      panel.innerHTML = `<button class="gen-btn" style="margin-bottom:8px;" onclick="triggerHeyGen()">
          🤖 Generate with HeyGen
        </button>
        <div class="url-hint">Renders a talking-head avatar video from the script above. Download it, edit backgrounds and graphics, then upload your final version in Step 2.</div>`
    }

    async function triggerHeyGen() {
      const script = document.getElementById('scriptArea').value.trim()
      if (!script) {
        document.getElementById('scriptError').innerHTML = `<div class="inline-error">Generate or write a video script first.</div>`
        document.getElementById('scriptArea').scrollIntoView({ behavior: 'smooth', block: 'center' })
        return
      }
      if (heygenPollInterval) clearInterval(heygenPollInterval)
      const panel = document.getElementById('heygenPanel')
      panel.innerHTML = `<div class="panel-info blue"><div class="panel-info-icon">🎬</div><div class="panel-info-body"><div class="panel-info-title">HeyGen is rendering the base video</div><div class="panel-info-sub" id="heygenMsg">Starting render…</div><div class="progress-wrap" style="margin-top:10px;"><div class="progress-bar-bg"><div class="progress-bar-fill" id="heygenBar" style="width:5%;"></div></div></div></div></div>`
      try {
        const r = await fetch('/api/content/generate-heygen-video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ script }),
        })
        if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Failed to start video generation')
        const videoId = d.videoId
        let elapsed = 0
        heygenPollInterval = setInterval(async () => {
          elapsed += 15
          const pct = Math.min(90, Math.round((elapsed / 360) * 100))
          const bar = document.getElementById('heygenBar')
          if (bar) bar.style.width = `${pct}%`
          const msg = document.getElementById('heygenMsg')
          const mins = Math.floor(elapsed / 60), secs = elapsed % 60
          if (msg) msg.textContent = `Rendering… ${mins > 0 ? mins + 'm ' : ''}${secs}s`
          try {
            const sr = await fetch(`/api/content/heygen-status?videoId=${encodeURIComponent(videoId)}`)
            const sd = await sr.json()
            if (sd.status === 'completed') {
              clearInterval(heygenPollInterval)
              panel.innerHTML = `<div class="panel-info green"><div class="panel-info-icon">✅</div><div class="panel-info-body"><div class="panel-info-title">Base video rendered</div><div class="panel-info-sub"><a href="${sd.videoUrl}" target="_blank" rel="noopener" style="color:var(--bronze);text-decoration:none;">Download video ↗</a> — edit in HeyGen or a video editor, then upload your final cut in Step 2.</div></div></div><button class="gen-btn" style="margin-top:10px;" onclick="resetHeygenPanel()">Generate new base video</button>`
            } else if (sd.status === 'failed') {
              clearInterval(heygenPollInterval)
              panel.innerHTML = `<div class="inline-error">HeyGen render failed: ${sd.error || 'Unknown error'}</div><button class="gen-btn" style="margin-top:10px;" onclick="resetHeygenPanel()">Try again</button>`
            } else if (elapsed >= 600) {
              clearInterval(heygenPollInterval)
              panel.innerHTML = `<div class="inline-error">HeyGen render timed out after 10 minutes.</div><button class="gen-btn" style="margin-top:10px;" onclick="resetHeygenPanel()">Try again</button>`
            }
          } catch { /* keep polling */ }
        }, 15000)
      } catch (err) {
        panel.innerHTML = `<div class="inline-error">${err.message}</div><button class="gen-btn" style="margin-top:10px;" onclick="resetHeygenPanel()">Try again</button>`
      }
    }

    async function handleVideoUpload(e) {
      const file = e.target.files[0]
      if (!file) return
      const panel = document.getElementById('videoPanel')
      panel.innerHTML = `<div class="progress-wrap"><div class="progress-label"><span>Uploading ${file.name}…</span><span id="videoUploadPct">0%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" id="videoUploadBar" style="width:0%;"></div></div></div>`
      try {
        const tokenRes = await fetch(`/api/content/upload-token?filename=${encodeURIComponent(file.name)}`)
        if (!tokenRes.ok) {
          if (tokenRes.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          throw new Error('Failed to get upload token')
        }
        const { token, uploadUrl } = await tokenRes.json()
        const blobUrl = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest()
          xhr.open('PUT', uploadUrl)
          xhr.setRequestHeader('Authorization', `Bearer ${token}`)
          xhr.setRequestHeader('x-content-type', file.type || 'video/mp4')
          xhr.upload.onprogress = (ev) => {
            if (ev.lengthComputable) {
              const pct = Math.round((ev.loaded / ev.total) * 100)
              const bar = document.getElementById('videoUploadBar')
              const pctEl = document.getElementById('videoUploadPct')
              if (bar) bar.style.width = pct + '%'
              if (pctEl) pctEl.textContent = pct + '%'
            }
          }
          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              try { resolve(JSON.parse(xhr.responseText).url) }
              catch { reject(new Error('Invalid response from Vercel Blob')) }
            } else {
              reject(new Error(`Upload failed (${xhr.status})`))
            }
          }
          xhr.onerror = () => reject(new Error('Network error during upload'))
          xhr.send(file)
        })
        pendingVideoUrl = blobUrl
        updatePublishBullet()
        panel.innerHTML = `<div class="panel-info green"><div class="panel-info-icon">🎥</div><div class="panel-info-body"><div class="panel-info-title">Video uploaded</div><div class="panel-info-sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${file.name}</div></div><button onclick="clearSavedVideo()" style="font-size:11px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;flex-shrink:0;margin-left:8px;">Remove</button></div>`
      } catch (err) {
        pendingVideoUrl = null
        panel.innerHTML = `<div class="inline-error">${err.message}</div><label class="upload-label" style="margin-top:10px;"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload Video<input class="upload-input" type="file" id="videoInput" accept="video/mp4,video/quicktime,video/webm,video/x-m4v" onchange="handleVideoUpload(event)"></label>`
      }
      e.target.value = ''
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
    }

    function buildImagePrompt(post) {
      const catLabel = CATEGORY_LABELS[post.category] || post.category
      const location = post.city
        ? post.city.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) + ', Coachella Valley, CA'
        : 'Coachella Valley, CA'
      return `YouTube-style real estate thumbnail for a blog post titled "${post.title}".
Community: ${location}
Topic: ${catLabel}
Context: ${post.excerpt || ''}

Style: bold text overlay, professional real estate feel, bright and eye-catching. Feature Coachella Valley desert scenery, a modern home, or a local landmark. Avoid generic stock-photo looks.`
    }

    function resizeImageToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader()
        reader.onload = (e) => {
          const img = new Image()
          img.onload = () => {
            const canvas = document.createElement('canvas')
            canvas.width = 1280; canvas.height = 720
            const ctx = canvas.getContext('2d')
            const srcAR = img.width / img.height
            const dstAR = 1280 / 720
            let sx = 0, sy = 0, sw = img.width, sh = img.height
            if (srcAR > dstAR) { sw = img.height * dstAR; sx = (img.width - sw) / 2 }
            else { sh = img.width / dstAR; sy = (img.height - sh) / 2 }
            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 1280, 720)
            resolve(canvas.toDataURL('image/jpeg', 0.88))
          }
          img.onerror = reject
          img.src = e.target.result
        }
        reader.onerror = reject
        reader.readAsDataURL(file)
      })
    }

    function render(post) {
      currentPost = post
      const status = post.workflowStatus || 'media_pending'
      const isPending = status === 'media_pending'
      const isReady   = status === 'media_ready'
      const catLabel  = CATEGORY_LABELS[post.category] || post.category
      const prompt    = buildImagePrompt(post)

      document.getElementById('topbarTitle').textContent = post.title
      document.title = `Review: ${post.title}`
      const pill = document.getElementById('statusPill')
      pill.className = `status-pill status-${status}`
      pill.textContent = isPending ? 'Media Pending' : 'Ready to Publish'

      const thumbHtml = post.heroImageUrl
        ? `<img id="thumbImg" src="${post.heroImageUrl}" alt="">`
        : `<div class="thumb-placeholder-inner" id="thumbImg">
            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            <span>No thumbnail yet</span>
          </div>`

      const savedScript = post.videoScript || ''
      const savedVideoUrl = post.videoUrl || ''
      if (savedVideoUrl) pendingVideoUrl = savedVideoUrl

      document.getElementById('editorGrid').innerHTML = `
        <!-- ═══ LEFT COLUMN ═══ -->
        <div class="editor-left">

          <!-- Article -->
          <div class="card">
            <div class="card-label">Article</div>
            <div class="meta-row">
              <span class="cat-badge">${catLabel}</span>
              <span class="post-date">${formatDate(post.publishedAt)}</span>
              ${post.sourceUrl ? `<a class="source-link" href="${post.sourceUrl}" target="_blank" rel="noopener">View Source ↗</a>` : ''}
            </div>
            <div class="title-row">
              <input class="title-input" id="titleInput" type="text" value="${post.title.replace(/"/g, '&quot;')}" />
              <button class="suggest-btn" id="suggestBtn">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Suggest Headlines
              </button>
            </div>
            <div class="title-suggestions" id="titleSuggestions" style="display:none;"></div>
            <div id="suggestError"></div>
            ${post.excerpt ? `<div class="post-excerpt">${post.excerpt}</div>` : ''}
          </div>

          <!-- Facebook caption -->
          <div class="card">
            <div class="card-label">Facebook Post Caption</div>
            <div class="caption-hint">This text will be posted to Shana's Facebook page. Edit it before publishing.</div>
            <button class="gen-btn" id="genBtn">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              Generate Caption
            </button>
            <textarea id="captionArea" placeholder="Facebook post caption will appear here after generating or editing…">${post.socialCopy || ''}</textarea>
            <div class="url-hint">The blog post URL will be appended automatically when published.</div>
            <div id="genError"></div>
          </div>

          <!-- Video Script -->
          <div class="card">
            <div class="card-label">Video Script</div>
            <div class="caption-hint" style="margin-bottom:12px;">
              A short script for Shana to record a talking-head video — key takeaways, what it means for the CV market, and a call to action.
            </div>
            <button class="gen-btn" id="scriptBtn">
              🎬 Generate Script
            </button>
            <textarea class="script-area" id="scriptArea" placeholder="Video script will appear here after generating…">${savedScript}</textarea>
            <div class="url-hint">Tip: Edit before recording. Read naturally — aim for 45–90 seconds.</div>
            <div id="scriptError"></div>
          </div>

          <!-- Video Generation + Upload -->
          <div class="card">
            <div class="card-label">Video</div>

            <!-- Step 1: HeyGen -->
            <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);">
              <div class="step-label">Step 1 — Generate Base Video with HeyGen (optional)</div>
              <div id="heygenPanel">
                <button class="gen-btn" id="heygenBtn" style="margin-bottom:8px;" onclick="triggerHeyGen()">
                  🤖 Generate with HeyGen
                </button>
                <div class="url-hint">Renders a talking-head avatar video from the script above. Download it, edit backgrounds and graphics, then upload your final version in Step 2.</div>
              </div>
            </div>

            <!-- Step 2: Upload final video -->
            <div>
              <div class="step-label">Step 2 — Upload Final Video</div>
              <div id="videoPanel">
                ${savedVideoUrl
                  ? `<div class="panel-info green"><div class="panel-info-icon">🎥</div><div class="panel-info-body"><div class="panel-info-title">Video saved</div><div class="panel-info-sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${savedVideoUrl.split('/').pop()}</div></div><button onclick="clearSavedVideo()" style="font-size:11px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;flex-shrink:0;margin-left:8px;">Replace</button></div>`
                  : `<label class="upload-label" id="videoUploadLabel">
                      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                      Upload Video
                      <input class="upload-input" type="file" id="videoInput" accept="video/mp4,video/quicktime,video/webm,video/x-m4v" onchange="handleVideoUpload(event)">
                    </label>
                    <div class="url-hint" style="margin-top:8px;">MP4, MOV, or WebM — up to 500 MB. Without a video, social posts will use the thumbnail image.</div>`
                }
              </div>
            </div>
          </div>

        </div>

        <!-- ═══ RIGHT COLUMN ═══ -->
        <div class="editor-right">

          <!-- Thumbnail preview -->
          <div class="card">
            <div class="card-label">Thumbnail Preview</div>
            <div class="thumb-preview-wrap" id="thumbWrap">${thumbHtml}</div>
            <label class="upload-label">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload Thumbnail
              <input class="upload-input" type="file" id="fileInput" accept="image/*">
            </label>
            <div class="upload-hint" id="uploadHint">JPEG, PNG, or WebP — resized to 1280×720 automatically</div>
          </div>

          <!-- Publish -->
          <div class="card publish-card">
            <div class="card-label">Publish</div>
            <div class="publish-bullets" id="publishBullets">
              <p>Pressing Publish will:</p>
              <ul>
                <li>Make the post live on the website</li>
                <li id="bulletFB">Post to Shana's Facebook page</li>
                <li id="bulletVideo" style="display:none;">Publish video to YouTube, TikTok, Facebook Reel, LinkedIn, X, Threads &amp; Instagram</li>
              </ul>
            </div>
            <div id="platformStatus" style="display:none;" class="platform-list"></div>
            <button class="btn-publish" id="publishBtn" ${!isReady ? 'disabled' : ''}>
              Publish
            </button>
            <button class="btn-mark-ready" id="markReadyBtn" ${!isPending ? 'disabled' : ''}>
              Mark as Ready
            </button>
            <div class="publish-prereq" id="publishPrereq" ${isReady ? 'style="display:none"' : ''}>
              Upload a thumbnail, then click<br>"Mark as Ready" first.
            </div>
            <div id="actionError"></div>
          </div>

        </div>
      `

      document.getElementById('editorGrid').style.display = 'grid'
      document.getElementById('loadingState').style.display = 'none'

      // File upload
      document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0]
        if (!file) return
        document.getElementById('uploadHint').textContent = 'Resizing…'
        try {
          pendingImageBase64 = await resizeImageToBase64(file)
          document.getElementById('thumbWrap').innerHTML =
            `<img id="thumbImg" src="${pendingImageBase64}" alt="">`
          document.getElementById('uploadHint').textContent = 'New thumbnail ready — click Mark as Ready to save.'
        } catch {
          document.getElementById('uploadHint').textContent = 'Could not process image. Try a different file.'
        }
      })

      updatePublishBullet()

      // Generate caption
      document.getElementById('genBtn').addEventListener('click', async () => {
        const btn = document.getElementById('genBtn')
        btn.disabled = true
        btn.innerHTML = `<span class="spinner spinner-muted"></span> Generating…`
        document.getElementById('genError').innerHTML = ''
        try {
          const r = await fetch('/api/blog/generate-caption', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug: post.slug }),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Failed')
          document.getElementById('captionArea').value = d.caption
        } catch (err) {
          document.getElementById('genError').innerHTML = `<div class="inline-error">${err.message}</div>`
        } finally {
          btn.disabled = false
          btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Generate Caption`
        }
      })

      // Suggest headlines
      document.getElementById('suggestBtn').addEventListener('click', async () => {
        const btn = document.getElementById('suggestBtn')
        btn.disabled = true
        btn.innerHTML = `<span class="spinner spinner-muted"></span> Generating…`
        document.getElementById('suggestError').innerHTML = ''
        document.getElementById('titleSuggestions').style.display = 'none'
        try {
          const r = await fetch('/api/blog/regenerate-title', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug: post.slug }),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Failed')
          const box = document.getElementById('titleSuggestions')
          box.style.display = 'flex'
          box.innerHTML = d.titles.map((t, i) =>
            `<button class="suggestion-pill" data-idx="${i}" onclick="applyTitle(this,'${t.replace(/'/g, "\\'")}')">${t}</button>`
          ).join('')
        } catch (err) {
          document.getElementById('suggestError').innerHTML =
            `<div class="inline-error" style="margin-top:8px;">${err.message}</div>`
        } finally {
          btn.disabled = false
          btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Suggest Headlines`
        }
      })

      // Generate video script
      document.getElementById('scriptBtn').addEventListener('click', async () => {
        const btn = document.getElementById('scriptBtn')
        btn.disabled = true
        btn.innerHTML = `<span class="spinner spinner-muted"></span> Writing script…`
        document.getElementById('scriptError').innerHTML = ''
        try {
          const r = await fetch('/api/content/generate-script', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: post.title, excerpt: post.excerpt, category: post.category }),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Failed')
          document.getElementById('scriptArea').value = d.script
        } catch (err) {
          document.getElementById('scriptError').innerHTML = `<div class="inline-error">${err.message}</div>`
        } finally {
          btn.disabled = false
          btn.innerHTML = '🎬 Generate Script'
        }
      })

      // Mark as Ready
      document.getElementById('markReadyBtn').addEventListener('click', async () => {
        const btn = document.getElementById('markReadyBtn')
        btn.disabled = true
        btn.textContent = 'Saving…'
        document.getElementById('actionError').innerHTML = ''
        const body = {
          slug: post.slug,
          socialCopy: document.getElementById('captionArea').value,
          title: document.getElementById('titleInput').value.trim() || post.title,
          videoScript: document.getElementById('scriptArea').value.trim() || undefined,
          videoUrl: pendingVideoUrl || undefined,
        }
        if (pendingImageBase64) body.heroImageBase64 = pendingImageBase64
        try {
          const r = await fetch('/api/blog/queue-mark-ready', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Failed')
          window.location.reload()
        } catch (err) {
          document.getElementById('actionError').innerHTML = `<div class="inline-error">${err.message}</div>`
          btn.disabled = false
          btn.textContent = 'Mark as Ready'
        }
      })

      // Publish
      document.getElementById('publishBtn').addEventListener('click', async () => {
        const btn = document.getElementById('publishBtn')
        btn.disabled = true
        btn.innerHTML = `<span class="spinner spinner-green"></span> Publishing…`
        document.getElementById('actionError').innerHTML = ''

        try {
          // 1. Save video fields + mark published in Redis
          const saveBody = {
            slug: post.slug,
            socialCopy: document.getElementById('captionArea').value,
            title: document.getElementById('titleInput').value.trim() || post.title,
            videoScript: document.getElementById('scriptArea').value.trim() || undefined,
            videoUrl: pendingVideoUrl || undefined,
          }
          if (pendingImageBase64) saveBody.heroImageBase64 = pendingImageBase64

          const saveRes = await fetch('/api/blog/queue-mark-ready', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(saveBody),
          })
          if (!saveRes.ok && saveRes.status !== 200) {
            const sd = await saveRes.json().catch(() => ({}))
            throw new Error(sd.error || 'Failed to save before publishing')
          }

          // 2. Publish the blog post live
          const r = await fetch('/api/blog/queue-publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug: post.slug }),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Publish failed')

          // 3. If a video is ready, push to all social platforms
          if (pendingVideoUrl) {
            btn.innerHTML = `<span class="spinner spinner-green"></span> Publishing to social…`
            document.getElementById('publishBullets').style.display = 'none'
            const pStatus = document.getElementById('platformStatus')
            pStatus.style.display = 'flex'
            pStatus.innerHTML = `
              <div class="platform-row"><span class="platform-icon">🌐</span><span class="platform-name">Website</span><span class="platform-status pstatus-done">Live</span></div>
              <div class="platform-row"><span class="platform-icon">🎬</span><span class="platform-name">Facebook Reel</span><span class="platform-status pstatus-polling" id="ps-facebookReel">Submitting…</span></div>
              <div class="platform-row"><span class="platform-icon">▶️</span><span class="platform-name">YouTube</span><span class="platform-status pstatus-polling" id="ps-youtube">Submitting…</span></div>
              <div class="platform-row"><span class="platform-icon">🎵</span><span class="platform-name">TikTok</span><span class="platform-status pstatus-polling" id="ps-tiktok">Submitting…</span></div>
              <div class="platform-row"><span class="platform-icon">💼</span><span class="platform-name">LinkedIn</span><span class="platform-status pstatus-polling" id="ps-linkedin">Submitting…</span></div>
              <div class="platform-row"><span class="platform-icon">𝕏</span><span class="platform-name">X / Twitter</span><span class="platform-status pstatus-polling" id="ps-twitter">Submitting…</span></div>
              <div class="platform-row"><span class="platform-icon">🧵</span><span class="platform-name">Threads</span><span class="platform-status pstatus-polling" id="ps-threads">Submitting…</span></div>
              <div class="platform-row"><span class="platform-icon">📸</span><span class="platform-name">Instagram Reel</span><span class="platform-status pstatus-polling" id="ps-instagramReel">Submitting…</span></div>
            `

            const vr = await fetch('/api/content/publish-video', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ slug: post.slug, videoUrl: pendingVideoUrl }),
            })
            const vd = await vr.json()

            const platforms = ['facebookReel', 'youtube', 'tiktok', 'linkedin', 'twitter', 'threads', 'instagramReel']
            platforms.forEach(platform => {
              const el = document.getElementById(`ps-${platform}`)
              if (!el) return
              const result = vd[platform]
              if (!result) { el.textContent = 'Skipped'; el.className = 'platform-status pstatus-idle'; return }
              if (result.error) { el.textContent = 'Error'; el.className = 'platform-status pstatus-error'; el.title = result.error; return }
              if (result.postSubmissionId) {
                el.textContent = 'Queued'
                el.className = 'platform-status pstatus-polling'
                // Poll for final status
                let attempts = 0
                const timer = setInterval(async () => {
                  attempts++
                  try {
                    const sr = await fetch(`/api/content/blotato-status?postSubmissionId=${encodeURIComponent(result.postSubmissionId)}`)
                    const sd = await sr.json()
                    if (sd.status === 'published') {
                      clearInterval(timer); delete publishPollTimers[platform]
                      el.textContent = 'Published'; el.className = 'platform-status pstatus-done'
                    } else if (sd.status === 'failed') {
                      clearInterval(timer); delete publishPollTimers[platform]
                      el.textContent = 'Failed'; el.className = 'platform-status pstatus-error'
                    } else if (attempts >= 30) {
                      clearInterval(timer); delete publishPollTimers[platform]
                      el.textContent = 'Queued'; el.className = 'platform-status pstatus-idle'
                    }
                  } catch { /* keep polling */ }
                }, 10000)
                publishPollTimers[platform] = timer
              }
            })

            btn.disabled = false
            btn.innerHTML = '✓ Published'
            btn.style.opacity = '0.5'
          } else {
            window.location.href = '/admin/va-queue/?published=1'
          }
        } catch (err) {
          document.getElementById('actionError').innerHTML = `<div class="inline-error">${err.message}</div>`
          btn.disabled = false
          btn.innerHTML = 'Publish'
        }
      })
    }

    function copyPrompt() {
      const text = document.getElementById('promptArea').value
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn')
        btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`
        setTimeout(() => {
          btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Prompt`
        }, 2000)
      })
    }

    function applyTitle(btn, title) {
      document.getElementById('titleInput').value = title
      document.querySelectorAll('.suggestion-pill').forEach(p => p.classList.remove('applied'))
      btn.classList.add('applied')
    }

    async function loadPost() {
      if (!slug) return
      try {
        const r = await fetch(`/api/blog/queue-post?slug=${encodeURIComponent(slug)}`)
        if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Not found')
        render(d.post)
      } catch (err) {
        document.getElementById('loadingState').innerHTML =
          `<div style="color:var(--muted);font-size:14px;"><strong style="color:var(--text);display:block;margin-bottom:6px;">Error loading post</strong>${err.message}</div>`
      }
    }

    loadPost()
  </script>
