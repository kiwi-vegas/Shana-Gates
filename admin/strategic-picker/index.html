<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/images/favcon.png" />
  <title>Strategic Blog Posts — Shana Gates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bronze: #B8975A;
      --teal:   #1A444C;
      --teal-h: #255a65;
      --bg:     #0a0a0a;
      --surf:   #141414;
      --surf2:  #1c1c1c;
      --surf3:  #242424;
      --border: rgba(255,255,255,0.08);
      --text:   #fff;
      --muted:  rgba(255,255,255,0.45);
      --font:   system-ui, -apple-system, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surf); border-bottom: 1px solid var(--border); padding: 20px 32px; }
    .header-brand { color: var(--bronze); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
    .header-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .header-sub { color: var(--muted); font-size: 13px; max-width: 600px; }

    /* ── Tabs ── */
    .tab-bar { background: var(--surf); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 0; overflow-x: auto; }
    .tab-btn { padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; font-family: var(--font); white-space: nowrap; transition: all 0.15s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--bronze); font-weight: 700; }
    .tab-count { display: inline-block; background: rgba(255,255,255,0.1); border-radius: 100px; padding: 1px 7px; font-size: 11px; margin-left: 6px; }
    .tab-btn.active .tab-count { background: rgba(184,151,90,0.2); color: var(--bronze); }

    /* ── Main ── */
    main { max-width: 900px; margin: 0 auto; padding: 36px 24px 100px; }

    /* ── Section heading ── */
    .section-note { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.5; }

    /* ── Category colors ── */
    .cat-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    /* ── Topic queue card ── */
    .topic-card {
      background: var(--surf);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .topic-card.drafted { opacity: 0.5; }
    .topic-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .topic-card-body { flex: 1; }
    .topic-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
    .topic-angle { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .topic-angle-full { display: none; }
    .topic-card:hover .topic-angle { display: none; }
    .topic-card:hover .topic-angle-full { display: block; font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; }
    .topic-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .topic-num { font-size: 11px; color: rgba(255,255,255,0.25); }

    .gen-btn {
      flex-shrink: 0;
      padding: 9px 18px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s;
      white-space: nowrap;
      min-width: 140px;
      text-align: center;
    }
    .gen-btn:hover:not(:disabled) { background: var(--teal-h); }
    .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .gen-btn.drafted { background: rgba(74,197,80,0.15); color: #4CAF50; cursor: default; }
    .gen-btn.loading { background: rgba(255,255,255,0.08); color: var(--muted); }

    /* ── Spinner ── */
    .spin {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Pending draft card ── */
    .draft-card {
      background: var(--surf);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .draft-card-top { padding: 20px 24px 16px; }
    .draft-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .draft-excerpt { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
    .draft-meta { display: flex; gap: 12px; align-items: center; font-size: 12px; color: rgba(255,255,255,0.3); }

    .draft-card-bottom {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
    }

    /* ── Thumbnail buckets ── */
    .buckets-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 16px;
    }
    .thumb-buckets { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 20px; }
    .thumb-bucket-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .thumb-bucket {
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
      background: var(--surf2);
      user-select: none;
    }
    .thumb-bucket:hover { border-color: rgba(184,151,90,0.5); background: rgba(184,151,90,0.05); }
    .thumb-bucket.drag-over { border-color: var(--bronze); background: rgba(184,151,90,0.1); border-style: solid; }
    .thumb-bucket.has-image { border-style: solid; border-color: var(--bronze); }
    .thumb-bucket img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; pointer-events: none; }
    .bucket-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; z-index: 1; padding: 8px; }
    .thumb-bucket.has-image .bucket-inner { display: none; }
    .bucket-icon { font-size: 22px; }
    .bucket-drop-hint { font-size: 10px; color: rgba(255,255,255,0.25); text-align: center; line-height: 1.4; }
    /* Checkmark overlay on filled bucket */
    .bucket-check {
      display: none;
      position: absolute; top: 6px; right: 6px; z-index: 2;
      width: 20px; height: 20px;
      background: var(--bronze); border-radius: 50%;
      align-items: center; justify-content: center;
      font-size: 11px; color: #000; font-weight: 700;
    }
    .thumb-bucket.has-image .bucket-check { display: flex; }
    /* Re-upload hint on hover when filled */
    .bucket-re-upload {
      display: none;
      position: absolute; inset: 0; z-index: 3;
      background: rgba(0,0,0,0.55);
      align-items: center; justify-content: center;
      font-size: 11px; color: #fff; font-weight: 600;
      text-align: center;
    }
    .thumb-bucket.has-image:hover .bucket-re-upload { display: flex; }

    /* Upload-in-progress overlay */
    .bucket-upload-overlay {
      position: absolute; inset: 0; z-index: 4;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
    }

    /* Aspect ratio sizing */
    .ratio-16-9 { width: 172px; height: 97px;  } /* 16:9 → h = 172×(9/16) = 97 */
    .ratio-1-1  { width: 155px; height: 155px; } /* 1:1 square */
    .ratio-9-16 { width: 97px;  height: 172px; } /* 9:16 → w = 172×(9/16) = 97 */

    .bucket-info { text-align: center; }
    .bucket-ratio { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .bucket-size  { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 3px; }
    .bucket-platforms { font-size: 10px; color: var(--muted); line-height: 1.5; }

    .draft-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .draft-hint { font-size: 12px; color: var(--muted); flex: 1; min-width: 120px; }

    .publish-btn {
      padding: 10px 22px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s;
    }
    .publish-btn:hover:not(:disabled) { background: var(--teal-h); }
    .publish-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .delete-btn {
      padding: 8px 14px;
      background: transparent;
      color: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }
    .delete-btn:hover { color: #ff6b6b; border-color: rgba(255,107,107,0.3); }

    /* ── Topic trash button ── */
    .topic-meta { justify-content: space-between; }
    .topic-meta-left { display: flex; gap: 8px; align-items: center; }
    .topic-trash-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      color: rgba(255,255,255,0.2);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .topic-trash-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.2); }
    .topic-trash-btn svg { width: 14px; height: 14px; }

    /* ── Hidden topics section ── */
    .hidden-topics-toggle {
      display: flex; align-items: center; gap: 8px;
      margin-top: 32px; margin-bottom: 12px;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      font-weight: 500;
      user-select: none;
      transition: color 0.15s;
    }
    .hidden-topics-toggle:hover { color: rgba(255,255,255,0.5); }
    .hidden-chevron { transition: transform 0.2s; font-size: 10px; }
    .hidden-chevron.open { transform: rotate(90deg); }
    .hidden-topics-list { display: none; }
    .hidden-topics-list.open { display: block; }
    .topic-card.dismissed { opacity: 0.35; border-style: dashed; }
    .topic-restore-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      background: transparent;
      color: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .topic-restore-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

    /* Dismissing animation */
    @keyframes fadeOut { to { opacity: 0; transform: translateX(12px); } }
    .topic-card.dismissing { animation: fadeOut 0.2s ease forwards; pointer-events: none; }

    /* Success banner */
    .success-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: rgba(74,197,80,0.12);
      border: 1px solid rgba(74,197,80,0.25);
      border-radius: 8px;
      font-size: 13px;
      color: #4CAF50;
      flex: 1;
    }
    .success-banner a { color: #6fcf75; }

    /* Error banner */
    .error-banner {
      padding: 10px 16px;
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 8px;
      font-size: 13px;
      color: #ff8a8a;
      flex: 1;
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* Loading skeleton */
    .skeleton { background: var(--surf); border-radius: 12px; padding: 20px 24px; margin-bottom: 12px; }
    .sk { background: rgba(255,255,255,0.06); border-radius: 6px; margin-bottom: 8px; animation: pulse 1.4s ease-in-out infinite; }
    .sk-short { width: 40%; height: 12px; }
    .sk-wide  { width: 85%; height: 16px; }
    .sk-med   { width: 65%; height: 12px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">Shana Gates · Blog System</div>
    <div class="header-title">Strategic Posts</div>
    <div class="header-sub">35 evergreen topics adapted from proven high-performers. Generate a draft, create your thumbnail manually, then publish — no automated image generation.</div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="queue">Topic Queue <span class="tab-count" id="count-queue">…</span></button>
    <button class="tab-btn" data-tab="pending">Pending Thumbnail <span class="tab-count" id="count-pending">…</span></button>
  </div>

  <main>
    <div id="loadingState">
      <div class="skeleton"><div class="sk sk-short" style="height:12px;margin-bottom:10px;"></div><div class="sk sk-wide" style="height:16px;margin-bottom:8px;"></div><div class="sk sk-med"></div></div>
      <div class="skeleton"><div class="sk sk-short" style="height:12px;margin-bottom:10px;"></div><div class="sk sk-wide" style="height:16px;margin-bottom:8px;"></div><div class="sk sk-med"></div></div>
      <div class="skeleton"><div class="sk sk-short" style="height:12px;margin-bottom:10px;"></div><div class="sk sk-wide" style="height:16px;margin-bottom:8px;"></div><div class="sk sk-med"></div></div>
    </div>
    <div id="queueContainer" style="display:none;"></div>
    <div id="pendingContainer" style="display:none;"></div>
  </main>

  <script>
    const CAT_COLORS = {
      'buying-tips':         ['#4CAF50', 'rgba(76,175,80,0.12)'],
      'selling-tips':        ['#0ea5e9', 'rgba(14,165,233,0.12)'],
      'community-spotlight': ['#9C27B0', 'rgba(156,39,176,0.12)'],
      'market-insight':      ['#4338CA', 'rgba(67,56,202,0.12)'],
      'investment':          ['#FF9800', 'rgba(255,152,0,0.12)'],
      'local-area':          ['#D97706', 'rgba(217,119,6,0.12)'],
      'market-update':       ['#2563eb', 'rgba(37,99,235,0.12)'],
      'news':                ['#607D8B', 'rgba(96,125,139,0.12)'],
    }
    const CAT_LABELS = {
      'buying-tips': 'Buying Tips', 'selling-tips': 'Selling Tips',
      'community-spotlight': 'Community Spotlight', 'market-insight': 'Market Insight',
      'investment': 'Investment', 'local-area': 'Local Area',
      'market-update': 'Market Update', 'news': 'News',
    }

    let allTopics = []
    let allDismissedTopics = []
    let allDrafts = []
    let draftedTopicIds = new Set()
    let activeTab = 'queue'
    // Map: draftId → { landscape?: string, square?: string, vertical?: string } (base64 dataUrls)
    const pendingImages = {}

    function catBadge(cat) {
      const [color, bg] = CAT_COLORS[cat] || ['#607D8B', 'rgba(96,125,139,0.12)']
      return `<span class="cat-badge" style="background:${bg};color:${color};">${CAT_LABELS[cat] || cat}</span>`
    }

    const TRASH_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`

    // ── Queue tab ─────────────────────────────────────────────────────────────

    function topicCardHtml(t, i, opts = {}) {
      const isDrafted = draftedTopicIds.has(t.id)
      const isDismissed = opts.dismissed || false
      const angleFull = escHtml(t.angle)
      const angleShort = escHtml(t.angle.slice(0, 120)) + (t.angle.length > 120 ? '…' : '')
      let btnHtml
      if (isDismissed) {
        btnHtml = `<button class="topic-restore-btn" onclick="restoreTopic('${t.id}')">Restore</button>`
      } else if (isDrafted) {
        btnHtml = `<button class="gen-btn drafted" disabled>✓ Draft created</button>`
      } else {
        btnHtml = `<button class="gen-btn" id="genbtn-${t.id}" onclick="generateDraft('${t.id}')">Generate Draft →</button>`
      }
      const trashBtn = isDismissed ? '' : `
        <button class="topic-trash-btn" onclick="dismissTopic('${t.id}')" title="Remove from queue">${TRASH_SVG}</button>`
      return `
        <div class="topic-card${isDrafted ? ' drafted' : ''}${isDismissed ? ' dismissed' : ''}" id="tcard-${t.id}">
          <div class="topic-meta">
            <div class="topic-meta-left">
              ${catBadge(t.category)}
              <span class="topic-num">#${String(i + 1).padStart(2, '0')}</span>
            </div>
            ${trashBtn}
          </div>
          <div class="topic-card-header">
            <div class="topic-card-body">
              <div class="topic-title">${escHtml(t.title)}</div>
              <div class="topic-angle">${angleShort}</div>
              <div class="topic-angle-full">${angleFull}</div>
            </div>
            ${btnHtml}
          </div>
        </div>`
    }

    function renderQueue() {
      document.getElementById('count-queue').textContent = allTopics.length

      if (!allTopics.length && !allDismissedTopics.length) {
        document.getElementById('queueContainer').innerHTML =
          '<div class="empty-state"><div class="empty-icon">📋</div><p>No topics loaded.</p></div>'
        return
      }

      const activeHtml = allTopics.map((t, i) => topicCardHtml(t, i)).join('')

      let dismissedSection = ''
      if (allDismissedTopics.length) {
        const dismissedHtml = allDismissedTopics.map((t, i) => topicCardHtml(t, i, { dismissed: true })).join('')
        dismissedSection = `
          <div class="hidden-topics-toggle" onclick="toggleHiddenTopics(this)">
            <span class="hidden-chevron">▶</span>
            Hidden topics (${allDismissedTopics.length})
          </div>
          <div class="hidden-topics-list" id="hiddenTopicsList">${dismissedHtml}</div>`
      }

      document.getElementById('queueContainer').innerHTML = activeHtml + dismissedSection
    }

    function toggleHiddenTopics(btn) {
      const list = document.getElementById('hiddenTopicsList')
      const chevron = btn.querySelector('.hidden-chevron')
      list.classList.toggle('open')
      chevron.classList.toggle('open')
    }

    async function dismissTopic(topicId) {
      const card = document.getElementById(`tcard-${topicId}`)
      if (card) card.classList.add('dismissing')

      try {
        const res = await fetch('/api/blog/strategic', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'dismiss-topic', topicId }),
        })
        if (!res.ok) throw new Error((await res.json()).error || 'Failed')

        const topic = allTopics.find(t => t.id === topicId)
        allTopics = allTopics.filter(t => t.id !== topicId)
        if (topic) allDismissedTopics.push(topic)
        renderQueue()
      } catch (err) {
        if (card) card.classList.remove('dismissing')
        alert('Error: ' + err.message)
      }
    }

    async function restoreTopic(topicId) {
      try {
        const res = await fetch('/api/blog/strategic', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'restore-topic', topicId }),
        })
        if (!res.ok) throw new Error((await res.json()).error || 'Failed')

        const topic = allDismissedTopics.find(t => t.id === topicId)
        allDismissedTopics = allDismissedTopics.filter(t => t.id !== topicId)
        if (topic) allTopics.push(topic)
        renderQueue()
      } catch (err) {
        alert('Error: ' + err.message)
      }
    }

    async function generateDraft(topicId) {
      const btn = document.getElementById(`genbtn-${topicId}`)
      if (!btn) return
      btn.disabled = true
      btn.className = 'gen-btn loading'
      btn.innerHTML = '<span class="spin"></span>Writing post…'

      try {
        const res = await fetch('/api/blog/strategic', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'draft', topicId }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Unknown error')

        draftedTopicIds.add(topicId)
        allDrafts.unshift(data.draft)
        updatePendingCount()

        btn.className = 'gen-btn drafted'
        btn.textContent = '✓ Draft created'
        document.getElementById(`tcard-${topicId}`).classList.add('drafted')

        // If user is on pending tab, refresh it
        if (activeTab === 'pending') renderPending()
      } catch (err) {
        btn.disabled = false
        btn.className = 'gen-btn'
        btn.textContent = 'Generate Draft →'
        alert('Error: ' + err.message)
      }
    }

    // ── Pending tab ───────────────────────────────────────────────────────────

    const FORMATS = [
      { key: 'landscape', ratio: '16:9', size: '1280 × 720',  platforms: 'Blog Post',                        cls: 'ratio-16-9' },
      { key: 'square',    ratio: '1:1',  size: '1080 × 1080', platforms: 'Instagram · Facebook · Pinterest',  cls: 'ratio-1-1'  },
      { key: 'vertical',  ratio: '9:16', size: '1080 × 1920', platforms: 'YouTube Shorts · TikTok · Reels',   cls: 'ratio-9-16' },
    ]

    function renderPending() {
      const container = document.getElementById('pendingContainer')
      if (!allDrafts.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🖼</div>
            <p>No drafts waiting for thumbnails yet.<br>Go to <strong>Topic Queue</strong> and generate a draft to get started.</p>
          </div>`
        return
      }

      container.innerHTML = allDrafts.map(d => draftCardHtml(d)).join('')

      // Wire up drag-and-drop and click for each bucket
      allDrafts.forEach(d => {
        FORMATS.forEach(fmt => {
          const bucket = document.getElementById(`bucket-${d.id}-${fmt.key}`)
          if (!bucket) return

          bucket.addEventListener('dragover', (e) => { e.preventDefault(); bucket.classList.add('drag-over') })
          bucket.addEventListener('dragleave', () => bucket.classList.remove('drag-over'))
          bucket.addEventListener('drop', (e) => {
            e.preventDefault()
            bucket.classList.remove('drag-over')
            const file = e.dataTransfer.files[0]
            if (file && file.type.startsWith('image/')) loadImageFile(d.id, fmt.key, file)
          })
          bucket.addEventListener('click', () => {
            const inp = document.createElement('input')
            inp.type = 'file'
            inp.accept = 'image/jpeg,image/png,image/webp'
            inp.onchange = (e) => { if (e.target.files[0]) loadImageFile(d.id, fmt.key, e.target.files[0]) }
            inp.click()
          })
        })
      })
    }

    function draftCardHtml(d) {
      const ago = timeAgo(d.createdAt)
      const pi = pendingImages[d.id] || {}
      const ready = ['landscape', 'square', 'vertical'].filter(f => pi[f]?.url)
      const anyUploading = ['landscape', 'square', 'vertical'].some(f => pi[f]?.uploading)
      const publishEnabled = ready.length > 0 && !anyUploading

      const bucketsHtml = FORMATS.map(fmt => {
        const state = pi[fmt.key]
        const hasPreview = !!state?.preview
        const isUploading = !!state?.uploading
        const hasUrl = !!state?.url
        return `
          <div class="thumb-bucket-wrap">
            <div class="thumb-bucket ${fmt.cls}${hasPreview ? ' has-image' : ''}" id="bucket-${d.id}-${fmt.key}">
              ${hasUrl ? '<div class="bucket-check">✓</div>' : ''}
              <div class="bucket-re-upload">Replace</div>
              ${hasPreview ? `<img src="${escAttr(state.preview)}">` : ''}
              ${isUploading ? '<div class="bucket-upload-overlay"><span class="spin" style="width:16px;height:16px;border-color:rgba(255,255,255,0.25);border-top-color:#fff;"></span></div>' : ''}
              <div class="bucket-inner">
                <span class="bucket-icon">🖼</span>
                <span class="bucket-drop-hint">Drop here<br>or click</span>
              </div>
            </div>
            <div class="bucket-info">
              <div class="bucket-ratio">${fmt.ratio}</div>
              <div class="bucket-size">${fmt.size}</div>
              <div class="bucket-platforms">${fmt.platforms}</div>
            </div>
          </div>`
      }).join('')

      const hintText = anyUploading ? 'Uploading…'
        : ready.length > 0 ? `${ready.length} thumbnail${ready.length > 1 ? 's' : ''} uploaded — publish when set.`
        : 'Upload at least one thumbnail to enable publishing.'

      return `
        <div class="draft-card" id="dcard-${d.id}">
          <div class="draft-card-top">
            ${catBadge(d.category)}
            <div class="draft-title">${escHtml(d.title)}</div>
            <div class="draft-excerpt">${escHtml(d.excerpt)}</div>
            <div class="draft-meta">
              <span>Created ${ago}</span>
              ${d.city ? `<span>· ${d.city}</span>` : ''}
            </div>
          </div>
          <div class="draft-card-bottom">
            <div class="buckets-label">Upload thumbnails — drag &amp; drop or click each bucket</div>
            <div class="thumb-buckets">${bucketsHtml}</div>
            <div class="draft-actions" id="dactions-${d.id}">
              <span class="draft-hint" id="dhint-${d.id}">${hintText}</span>
              <button class="publish-btn" id="pubbtn-${d.id}" ${publishEnabled ? '' : 'disabled'} onclick="publishDraft('${d.id}')">Publish Post →</button>
              <button class="delete-btn" onclick="deleteDraft('${d.id}')">Discard</button>
            </div>
          </div>
        </div>`
    }

    // pendingImages[draftId][format] = { preview: localDataUrl, url: blobUrl | null, uploading: bool }

    function loadImageFile(draftId, format, file) {
      const reader = new FileReader()
      reader.onload = async (ev) => {
        const dataUrl = ev.target.result

        if (!pendingImages[draftId]) pendingImages[draftId] = {}
        pendingImages[draftId][format] = { preview: dataUrl, url: null, uploading: true }

        // Show preview + uploading overlay immediately
        const bucket = document.getElementById(`bucket-${draftId}-${format}`)
        if (bucket) {
          bucket.classList.add('has-image')
          bucket.querySelectorAll('img').forEach(el => el.remove())
          const img = document.createElement('img')
          img.src = dataUrl
          bucket.prepend(img)
          if (!bucket.querySelector('.bucket-upload-overlay')) {
            const ov = document.createElement('div')
            ov.className = 'bucket-upload-overlay'
            ov.innerHTML = '<span class="spin" style="width:16px;height:16px;border-color:rgba(255,255,255,0.25);border-top-color:#fff;"></span>'
            bucket.appendChild(ov)
          }
        }
        refreshPublishBar(draftId)

        try {
          const res = await fetch('/api/blog/strategic', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'upload-image', draftId, format, imageDataUrl: dataUrl }),
          })
          const data = await res.json()
          if (!res.ok) throw new Error(data.error || 'Upload failed')

          pendingImages[draftId][format].url = data.url
          pendingImages[draftId][format].uploading = false
          if (bucket) bucket.querySelector('.bucket-upload-overlay')?.remove()
        } catch (err) {
          // Reset this bucket on failure
          pendingImages[draftId][format] = null
          if (bucket) {
            bucket.classList.remove('has-image')
            bucket.querySelectorAll('img').forEach(el => el.remove())
            bucket.querySelector('.bucket-upload-overlay')?.remove()
          }
          alert('Upload failed: ' + err.message)
        }
        refreshPublishBar(draftId)
      }
      reader.readAsDataURL(file)
    }

    function refreshPublishBar(draftId) {
      const pi = pendingImages[draftId] || {}
      const ready = ['landscape', 'square', 'vertical'].filter(f => pi[f]?.url)
      const anyUploading = ['landscape', 'square', 'vertical'].some(f => pi[f]?.uploading)
      const btn  = document.getElementById(`pubbtn-${draftId}`)
      const hint = document.getElementById(`dhint-${draftId}`)
      if (btn) btn.disabled = ready.length === 0 || anyUploading
      if (hint) {
        if (anyUploading) hint.textContent = 'Uploading…'
        else if (ready.length > 0) hint.textContent = `${ready.length} thumbnail${ready.length > 1 ? 's' : ''} uploaded — publish when set.`
        else hint.textContent = 'Upload at least one thumbnail to enable publishing.'
      }
    }

    async function publishDraft(draftId) {
      const pi = pendingImages[draftId] || {}
      const imageUrls = {
        landscape: pi.landscape?.url || null,
        square:    pi.square?.url    || null,
        vertical:  pi.vertical?.url  || null,
      }
      if (!imageUrls.landscape && !imageUrls.square && !imageUrls.vertical) {
        alert('Upload at least one thumbnail first.')
        return
      }

      const btn = document.getElementById(`pubbtn-${draftId}`)
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Publishing…' }

      try {
        const res = await fetch('/api/blog/strategic', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'publish', draftId, imageUrls }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Unknown error')

        allDrafts = allDrafts.filter(d => d.id !== draftId)
        delete pendingImages[draftId]
        updatePendingCount()

        const bottom = document.getElementById(`dcard-${draftId}`)?.querySelector('.draft-card-bottom')
        if (bottom) {
          bottom.innerHTML = `
            <div class="success-banner">
              ✅ Published! <a href="/blog/post.html?slug=${encodeURIComponent(data.slug)}" target="_blank">View post →</a>
            </div>`
        }
      } catch (err) {
        if (btn) { btn.disabled = false; btn.textContent = 'Publish Post →' }
        const dactions = document.getElementById(`dactions-${draftId}`)
        if (dactions) {
          const errEl = document.createElement('div')
          errEl.className = 'error-banner'
          errEl.textContent = 'Error: ' + err.message
          dactions.prepend(errEl)
        }
      }
    }

    async function deleteDraft(draftId) {
      if (!confirm('Discard this draft? This cannot be undone.')) return
      try {
        await fetch('/api/blog/strategic', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'delete', draftId }),
        })
        allDrafts = allDrafts.filter(d => d.id !== draftId)
        delete pendingImages[draftId]

        // Also un-mark the topic in the queue
        const draft = allDrafts.find(d => d.id === draftId) // already removed, but track topicId before removal
        // Rebuild draftedTopicIds from remaining drafts
        draftedTopicIds = new Set(allDrafts.map(d => d.topicId))

        updatePendingCount()
        renderPending()
        renderQueue()
      } catch (e) {
        alert('Delete failed: ' + e.message)
      }
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────

    document.querySelector('.tab-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn')
      if (!btn) return
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      activeTab = btn.dataset.tab
      showTab(activeTab)
    })

    function showTab(tab) {
      document.getElementById('queueContainer').style.display = tab === 'queue' ? '' : 'none'
      document.getElementById('pendingContainer').style.display = tab === 'pending' ? '' : 'none'
      if (tab === 'pending') renderPending()
    }

    function updatePendingCount() {
      document.getElementById('count-pending').textContent = allDrafts.length
    }

    // ── Load ──────────────────────────────────────────────────────────────────

    async function load() {
      try {
        const [topicsRes, draftsRes] = await Promise.all([
          fetch('/api/blog/strategic?action=topics'),
          fetch('/api/blog/strategic?action=drafts'),
        ])

        if (topicsRes.status === 401 || draftsRes.status === 401) {
          window.location.href = '/admin/assistant/login.html?next=' + encodeURIComponent(window.location.pathname)
          return
        }

        const topicsData = await topicsRes.json()
        const draftsData = await draftsRes.json()

        allTopics = topicsData.topics || []
        allDismissedTopics = topicsData.dismissedTopics || []
        allDrafts = draftsData.drafts || []
        draftedTopicIds = new Set(topicsData.draftedTopicIds || [])

        updatePendingCount()
        document.getElementById('loadingState').style.display = 'none'
        document.getElementById('queueContainer').style.display = ''
        renderQueue()
      } catch (err) {
        document.getElementById('loadingState').innerHTML =
          `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load topics.<br><small>${err.message}</small></p></div>`
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }
    function escAttr(s) {
      return String(s).replace(/"/g, '&quot;')
    }
    function timeAgo(iso) {
      const diff = (Date.now() - new Date(iso).getTime()) / 1000
      if (diff < 60) return 'just now'
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago'
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago'
      return Math.floor(diff / 86400) + 'd ago'
    }

    load()
  </script>
</body>
</html>
