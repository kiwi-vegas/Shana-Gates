<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/images/favcon.png" />
  <title>Daily Blog Picker — Shana Gates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bronze: #B8975A;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: rgba(255,255,255,0.45);
      --font: system-ui, -apple-system, sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand { color: var(--bronze); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
    .header-title { color: var(--text); font-size: 18px; font-weight: 700; }
    .header-meta { color: var(--muted); font-size: 13px; }

    /* ── Main ── */
    main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Article card ── */
    .article-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.15s;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 16px;
      align-items: flex-start;
      user-select: none;
    }
    .article-card:hover { border-color: rgba(184,151,90,0.35); }
    .article-card.selected {
      border-color: var(--bronze);
      background: rgba(184,151,90,0.06);
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .article-card.selected .checkbox {
      background: var(--bronze);
      border-color: var(--bronze);
    }
    .checkbox-check { display: none; }
    .article-card.selected .checkbox-check { display: block; }

    .article-content {}
    .article-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .category-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .score-badge {
      font-size: 12px;
      color: var(--muted);
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 100px;
    }
    .article-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
    .article-summary { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
    .article-why {
      font-size: 13px;
      color: var(--bronze);
      font-style: italic;
      line-height: 1.5;
    }
    .article-source { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 6px; }
    .article-source a { color: rgba(255,255,255,0.25); text-decoration: none; }
    .article-source a:hover { color: var(--muted); }

    /* ── Sticky footer bar ── */
    .publish-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 50;
    }
    .publish-count { color: var(--muted); font-size: 14px; }
    .publish-count strong { color: var(--text); }
    .publish-btn {
      background: var(--bronze);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 13px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
    }
    .publish-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .publish-btn:not(:disabled):hover { opacity: 0.85; }

    /* ── States ── */
    .state-msg {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .state-msg h2 { color: var(--text); font-size: 22px; margin-bottom: 12px; }
    .run-research-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      background: var(--bronze);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 13px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
    }
    .run-research-btn:hover { opacity: 0.85; }
    .run-research-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .sk { background: #1e1e1e; border-radius: 6px; animation: shimmer 1.5s ease-in-out infinite; }
    .sk-line { height: 12px; margin-bottom: 10px; }
    .sk-line.narrow { width: 30%; }
    .sk-line.wide { width: 100%; }
    .sk-line.medium { width: 65%; }
    @keyframes shimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

    /* ── Publishing overlay ── */
    .publish-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      display: none;
    }
    .publish-overlay.visible { display: flex; }
    .publish-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(184,151,90,0.3);
      border-top-color: var(--bronze);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .publish-overlay p { color: var(--text); font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .publish-overlay small { color: var(--muted); font-size: 13px; }

    /* ── Image review ── */
    .image-review-section { margin-bottom: 32px; }
    .review-article-header {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .placement-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 14px;
    }
    .placement-concept {
      color: var(--bronze);
      font-style: italic;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .photo-thumb {
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .photo-thumb.active { border-color: var(--bronze); }
    .photo-thumb img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .photo-credit { font-size: 11px; color: var(--muted); margin-top: 6px; text-align: center; }
    .skip-placement {
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-top: 10px;
      text-decoration: underline;
      font-family: var(--font);
    }
    .placement-card.skipped { opacity: 0.4; }
    .review-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 32px;
    }
    .skip-images-link {
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      font-family: var(--font);
    }

    /* ── Drag-and-drop upload zone ── */
    .upload-zone {
      margin-top: 14px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--bronze);
      background: rgba(184,151,90,0.06);
    }
    .upload-zone-icon { font-size: 22px; flex-shrink: 0; }
    .upload-zone-body { flex: 1; min-width: 0; }
    .upload-zone-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1px;
    }
    .upload-zone-sub {
      font-size: 11px;
      color: var(--muted);
    }
    .upload-zone-btn {
      flex-shrink: 0;
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .upload-zone-btn:hover { border-color: var(--bronze); }
    .upload-zone.has-upload { border-color: var(--bronze); border-style: solid; }
    .upload-zone.has-upload .upload-zone-title { color: var(--bronze); }

    @media (max-width: 640px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; padding: 16px; }
      main { padding: 24px 16px 100px; }
      .publish-bar { padding: 12px 16px; }
      .photo-grid { gap: 6px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="header-brand">Shana Gates · Craft &amp; Bauer</div>
      <div class="header-title">Daily Blog Picker</div>
    </div>
    <div class="header-meta" id="headerMeta">Loading today's articles…</div>
  </header>

  <main id="main">
    <!-- Loading skeletons -->
    <div id="loadingState">
      <div class="skeleton"><div class="sk sk-line narrow"></div><div class="sk sk-line wide" style="height:18px;margin-bottom:12px;"></div><div class="sk sk-line wide"></div><div class="sk sk-line medium"></div></div>
      <div class="skeleton"><div class="sk sk-line narrow"></div><div class="sk sk-line wide" style="height:18px;margin-bottom:12px;"></div><div class="sk sk-line wide"></div><div class="sk sk-line medium"></div></div>
      <div class="skeleton"><div class="sk sk-line narrow"></div><div class="sk sk-line wide" style="height:18px;margin-bottom:12px;"></div><div class="sk sk-line wide"></div><div class="sk sk-line medium"></div></div>
      <div class="skeleton"><div class="sk sk-line narrow"></div><div class="sk sk-line wide" style="height:18px;margin-bottom:12px;"></div><div class="sk sk-line wide"></div><div class="sk sk-line medium"></div></div>
      <div class="skeleton"><div class="sk sk-line narrow"></div><div class="sk sk-line wide" style="height:18px;margin-bottom:12px;"></div><div class="sk sk-line wide"></div><div class="sk sk-line medium"></div></div>
      <div class="skeleton"><div class="sk sk-line narrow"></div><div class="sk sk-line wide" style="height:18px;margin-bottom:12px;"></div><div class="sk sk-line wide"></div><div class="sk sk-line medium"></div></div>
    </div>
    <div id="articlesContainer"></div>
    <div id="imageReviewContainer" style="display:none;"></div>
  </main>

  <div class="publish-bar">
    <div class="publish-count" id="publishCount"><strong>0</strong> articles selected</div>
    <button class="publish-btn" id="publishBtn" disabled>Select articles to publish</button>
  </div>

  <div class="publish-overlay" id="publishOverlay">
    <div class="publish-spinner"></div>
    <p id="publishStatus">Writing posts…</p>
    <small>This usually takes 30–60 seconds per post</small>
  </div>

  <script>
    const CATEGORY_COLORS = {
      'market-update': '#2563eb', 'buying-tips': '#4CAF50', 'selling-tips': '#0ea5e9',
      'community-spotlight': '#9C27B0', 'investment': '#FF9800', 'news': '#607D8B',
      'local-area': '#D97706', 'market-insight': '#4338CA',
    }
    const CATEGORY_LABELS = {
      'market-update': 'Market Update', 'buying-tips': 'Buying Tips', 'selling-tips': 'Selling Tips',
      'community-spotlight': 'Community Spotlight', 'investment': 'Investment', 'news': 'News',
      'local-area': 'Local Area', 'market-insight': 'Market Insight',
    }

    // Auth check
    if (!localStorage.getItem('sg_auth')) {
      window.location.href = '/admin/assistant/login.html'
    }

    let articles = []
    let selectedIds = new Set()
    let currentDate = ''
    let step = 'selecting'          // 'selecting' | 'reviewing'
    let imageSuggestions = []
    let imageApprovals = {}         // key: "${itemId}_${sectionIndex}", value: {sectionIndex, altText, photo} | null

    const params = new URLSearchParams(window.location.search)
    const dateParam = params.get('date') || ''

    async function loadArticles() {
      const url = `/api/blog/articles${dateParam ? `?date=${dateParam}` : ''}`
      const res = await fetch(url)
      if (!res.ok) throw new Error('Failed to load')
      const data = await res.json()
      return data
    }

    function renderArticles(data) {
      articles = data.articles || []
      currentDate = data.date || new Date().toISOString().split('T')[0]

      document.getElementById('headerMeta').textContent =
        `${articles.length} articles for ${new Date(currentDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}`

      document.getElementById('loadingState').style.display = 'none'

      if (!articles.length) {
        document.getElementById('articlesContainer').innerHTML = `
          <div class="state-msg">
            <h2>No articles today</h2>
            <p>The daily research runs automatically each morning. You can also run it right now.</p>
            <button class="run-research-btn" onclick="runDailyResearch()">
              ✦ Run Today's Research
            </button>
          </div>`
        return
      }

      document.getElementById('articlesContainer').innerHTML = articles.map(a => {
        const color = CATEGORY_COLORS[a.category] || '#607D8B'
        const label = CATEGORY_LABELS[a.category] || a.category
        return `
          <div class="article-card" data-id="${a.id}" onclick="toggleArticle('${a.id}')">
            <div class="checkbox">
              <svg class="checkbox-check" width="13" height="10" viewBox="0 0 13 10" fill="none">
                <path d="M1.5 5L5 8.5L11.5 1.5" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="article-content">
              <div class="article-top">
                <span class="category-badge" style="background:${color}22;color:${color};">${label}</span>
                <span class="score-badge">Score ${a.score}/10</span>
              </div>
              <div class="article-title">${a.title}</div>
              <div class="article-summary">${a.summary}</div>
              <div class="article-why">${a.whyItMatters}</div>
              <div class="article-source"><a href="${a.url}" target="_blank" rel="noopener">${a.source}</a></div>
            </div>
          </div>`
      }).join('')
    }

    function toggleArticle(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id)
        document.querySelector(`[data-id="${id}"]`).classList.remove('selected')
      } else if (selectedIds.size < 5) {
        selectedIds.add(id)
        document.querySelector(`[data-id="${id}"]`).classList.add('selected')
      }
      updatePublishBar()
    }

    function updatePublishBar() {
      const count = selectedIds.size
      const countEl = document.getElementById('publishCount')
      const btn = document.getElementById('publishBtn')
      countEl.innerHTML = `<strong>${count}</strong> article${count !== 1 ? 's' : ''} selected`
      if (count === 0) {
        btn.disabled = true
        btn.textContent = 'Select articles to publish'
      } else {
        btn.disabled = false
        btn.textContent = `Add Photos + Publish →`
      }
    }

    // ── Image review step ──

    async function startImageReview() {
      if (!selectedIds.size) return
      const overlay = document.getElementById('publishOverlay')
      const status = document.getElementById('publishStatus')
      const overlaySmall = document.querySelector('#publishOverlay small')
      overlay.classList.add('visible')
      status.textContent = 'Finding the best images…'
      overlaySmall.textContent = 'Analyzing your articles with local Coachella Valley expertise'

      try {
        const selectedArticles = articles.filter(a => selectedIds.has(a.id))
        const res = await fetch('/api/blog/suggest-images', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: selectedArticles }),
        })
        let data
        try { data = await res.json() } catch { throw new Error(`Server error (${res.status})`) }
        if (!res.ok) throw new Error(data.error || 'Image suggestion failed')

        overlay.classList.remove('visible')
        step = 'reviewing'
        imageSuggestions = data.suggestions || []
        document.getElementById('articlesContainer').style.display = 'none'
        document.getElementById('imageReviewContainer').style.display = 'block'
        renderImageReview(imageSuggestions)
      } catch (err) {
        overlay.classList.remove('visible')
        // If image suggestion fails, fall through to publish without photos
        const ok = confirm(`Couldn't load image suggestions: ${err.message}\n\nPublish without inline photos?`)
        if (ok) publishWithoutPhotos()
      }
    }

    function renderImageReview(suggestions) {
      imageApprovals = {}
      const container = document.getElementById('imageReviewContainer')

      let html = ''
      for (const suggestion of suggestions) {
        html += `<div class="image-review-section">`
        html += `<div class="review-article-header">${suggestion.title}</div>`

        for (const placement of suggestion.placements) {
          const key = `${suggestion.itemId}_${placement.sectionIndex}`

          // Pre-select first photo
          if (placement.photos.length > 0) {
            imageApprovals[key] = {
              sectionIndex: placement.sectionIndex,
              altText: placement.altText,
              photo: {
                regularUrl: placement.photos[0].regularUrl,
                authorName: placement.photos[0].authorName,
                authorUrl: placement.photos[0].authorUrl,
                source: placement.photos[0].source || 'unsplash',
              },
            }
          }

          html += `<div class="placement-card" id="pc_${key}" data-key="${key}" data-item="${suggestion.itemId}" data-section="${placement.sectionIndex}" data-alt="${encodeURIComponent(placement.altText)}">`
          html += `<div class="placement-concept">${placement.concept}</div>`
          html += `<div class="photo-grid">`

          placement.photos.forEach((photo, photoIdx) => {
            const isFirst = photoIdx === 0
            html += `<div class="photo-thumb${isFirst ? ' active' : ''}" data-key="${key}" data-photo-idx="${photoIdx}" data-item="${suggestion.itemId}" data-section="${placement.sectionIndex}" data-regular="${encodeURIComponent(photo.regularUrl)}" data-author="${encodeURIComponent(photo.authorName)}" data-author-url="${encodeURIComponent(photo.authorUrl)}" data-source="${photo.source || 'unsplash'}" onclick="selectPhoto(this)">`
            html += `<img src="${photo.thumbUrl}" alt="${photo.authorName}" loading="lazy">`
            html += `</div>`
          })

          if (!placement.photos.length) {
            html += `<div style="color:var(--muted);font-size:13px;padding:12px 0;">No photos found for this placement.</div>`
          }

          html += `</div>` // photo-grid

          // Credit line for selected photo
          if (placement.photos.length > 0) {
            html += `<div class="photo-credit" id="credit_${key}">${placement.photos[0].authorName}</div>`
          }

          // Drag-and-drop upload zone
          html += `<div class="upload-zone" id="uz_${key}" data-key="${key}"
            ondragover="event.preventDefault();this.classList.add('drag-over')"
            ondragleave="this.classList.remove('drag-over')"
            ondrop="handlePhotoDrop(event,'${key}')">`
          html += `<span class="upload-zone-icon">📷</span>`
          html += `<div class="upload-zone-body">`
          html += `<div class="upload-zone-title" id="uzt_${key}">Use your own photo</div>`
          html += `<div class="upload-zone-sub">Drag & drop here — resized &amp; optimized automatically</div>`
          html += `</div>`
          html += `<label class="upload-zone-btn">Browse<input type="file" accept="image/*" style="display:none" onchange="handlePhotoFile(event,'${key}')"></label>`
          html += `</div>` // upload-zone

          html += `<button class="skip-placement" onclick="skipPlacement('${key}')">Skip this image</button>`
          html += `</div>` // placement-card
        }

        html += `</div>` // image-review-section
      }

      html += `<div class="review-actions">`
      html += `<button class="publish-btn" onclick="publishWithPhotos()">Publish with Photos →</button>`
      html += `<button class="skip-images-link" onclick="publishWithoutPhotos()">Skip → Publish without photos</button>`
      html += `</div>`

      container.innerHTML = html
    }

    function selectPhoto(thumbEl) {
      const key = thumbEl.dataset.key
      const itemId = thumbEl.dataset.item
      const sectionIndex = parseInt(thumbEl.dataset.section)
      const altText = decodeURIComponent(document.querySelector(`[data-key="${key}"].placement-card`).dataset.alt)
      const regularUrl = decodeURIComponent(thumbEl.dataset.regular)
      const authorName = decodeURIComponent(thumbEl.dataset.author)
      const authorUrl = decodeURIComponent(thumbEl.dataset.authorUrl)
      const source = thumbEl.dataset.source || 'unsplash'

      // Deselect all thumbs in this card
      document.querySelectorAll(`.photo-thumb[data-key="${key}"]`).forEach(el => el.classList.remove('active'))
      thumbEl.classList.add('active')

      // Update credit
      const creditEl = document.getElementById(`credit_${key}`)
      if (creditEl) creditEl.textContent = authorName

      // Re-enable card if it was skipped
      const card = document.getElementById(`pc_${key}`)
      if (card) card.classList.remove('skipped')

      imageApprovals[key] = { sectionIndex, altText, photo: { regularUrl, authorName, authorUrl, source } }
    }

    function skipPlacement(key) {
      imageApprovals[key] = null
      const card = document.getElementById(`pc_${key}`)
      if (card) {
        card.classList.add('skipped')
        document.querySelectorAll(`.photo-thumb[data-key="${key}"]`).forEach(el => el.classList.remove('active'))
      }
    }

    // ── Upload helpers ──────────────────────────────────────────────────────

    function resizeImageToJpeg(file, maxWidth, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader()
        reader.onerror = reject
        reader.onload = (e) => {
          const img = new Image()
          img.onerror = reject
          img.onload = () => {
            let w = img.naturalWidth, h = img.naturalHeight
            if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth }
            const canvas = document.createElement('canvas')
            canvas.width = w; canvas.height = h
            canvas.getContext('2d').drawImage(img, 0, 0, w, h)
            resolve(canvas.toDataURL('image/jpeg', quality))
          }
          img.src = e.target.result
        }
        reader.readAsDataURL(file)
      })
    }

    async function applyUploadedPhoto(file, key) {
      if (!file || !file.type.startsWith('image/')) {
        alert('Please drop an image file (JPG, PNG, WEBP, etc.)'); return
      }
      const zone = document.getElementById(`uz_${key}`)
      const title = document.getElementById(`uzt_${key}`)
      if (title) title.textContent = 'Processing…'

      let dataUrl
      try {
        dataUrl = await resizeImageToJpeg(file, 1600, 0.85)
      } catch {
        if (title) title.textContent = 'Use your own photo'
        alert('Could not read image. Please try another file.'); return
      }

      // Deselect all existing thumbs for this key
      document.querySelectorAll(`.photo-thumb[data-key="${key}"]`).forEach(el => el.classList.remove('active'))

      // Create or update a custom thumb in the photo grid
      const grid = document.querySelector(`#pc_${key} .photo-grid`)
      let uploadThumb = grid?.querySelector('.photo-thumb[data-source="upload"]')
      if (!uploadThumb) {
        uploadThumb = document.createElement('div')
        uploadThumb.className = 'photo-thumb active'
        uploadThumb.dataset.key = key
        uploadThumb.dataset.source = 'upload'
        const imgEl = document.createElement('img')
        imgEl.alt = 'Your photo'
        imgEl.style.cssText = 'width:100%;aspect-ratio:4/3;object-fit:cover;display:block;'
        uploadThumb.appendChild(imgEl)
        grid?.prepend(uploadThumb)
      }
      uploadThumb.querySelector('img').src = dataUrl
      uploadThumb.classList.add('active')
      uploadThumb.onclick = () => {
        document.querySelectorAll(`.photo-thumb[data-key="${key}"]`).forEach(el => el.classList.remove('active'))
        uploadThumb.classList.add('active')
        document.getElementById(`pc_${key}`)?.classList.remove('skipped')
        const credit = document.getElementById(`credit_${key}`)
        if (credit) credit.textContent = 'Your photo'
        imageApprovals[key] = { ...imageApprovals[key], photo: { regularUrl: '', authorName: 'Your photo', authorUrl: '', source: 'upload', dataUrl } }
      }

      // Update credit + re-enable card
      const credit = document.getElementById(`credit_${key}`)
      if (credit) credit.textContent = 'Your photo'
      document.getElementById(`pc_${key}`)?.classList.remove('skipped')

      // Store approval with base64 payload
      const card = document.getElementById(`pc_${key}`)
      const altText = card ? decodeURIComponent(card.dataset.alt || '') : ''
      const sectionIndex = card ? parseInt(card.dataset.section || '0') : 0
      imageApprovals[key] = { sectionIndex, altText, photo: { regularUrl: '', authorName: 'Your photo', authorUrl: '', source: 'upload', dataUrl } }

      // Mark zone as done
      if (zone) zone.classList.add('has-upload')
      if (title) title.textContent = '✓ Your photo selected'
    }

    function handlePhotoDrop(event, key) {
      event.preventDefault()
      document.getElementById(`uz_${key}`)?.classList.remove('drag-over')
      applyUploadedPhoto(event.dataTransfer.files[0], key)
    }

    function handlePhotoFile(event, key) {
      applyUploadedPhoto(event.target.files[0], key)
    }

    async function publishWithPhotos() {
      // Build imageSelections from approvals (exclude nulls, group by itemId)
      const byItem = {}
      for (const [key, approval] of Object.entries(imageApprovals)) {
        if (!approval) continue
        const itemId = key.split('_')[0]
        if (!byItem[itemId]) byItem[itemId] = []
        byItem[itemId].push(approval)
      }
      const imageSelections = Object.entries(byItem).map(([itemId, placements]) => ({ itemId, placements }))

      const overlay = document.getElementById('publishOverlay')
      const status = document.getElementById('publishStatus')
      document.querySelector('#publishOverlay small').textContent = 'Writing posts with inline photos…'
      overlay.classList.add('visible')
      status.textContent = `Writing & publishing with photos…`

      try {
        const res = await fetch('/api/blog/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: currentDate, articleIds: [...selectedIds], imageSelections }),
        })
        let data
        try { data = await res.json() } catch { throw new Error(`Server error (${res.status}) — check Vercel function logs for details.`) }
        if (!res.ok) throw new Error(data.error || 'Publish failed')

        status.textContent = `✓ Published ${data.published} post${data.published !== 1 ? 's' : ''}!`
        const firstSlug = data.posts?.[0]?.slug
        const dest = firstSlug ? `/blog/post.html?slug=${encodeURIComponent(firstSlug)}` : '/blog/'
        setTimeout(() => { window.location.href = dest }, 2000)
      } catch (err) {
        overlay.classList.remove('visible')
        alert(`Error: ${err.message}`)
      }
    }

    async function publishWithoutPhotos() {
      if (!selectedIds.size) return
      const overlay = document.getElementById('publishOverlay')
      const status = document.getElementById('publishStatus')
      overlay.classList.add('visible')
      status.textContent = `Writing ${selectedIds.size} post${selectedIds.size !== 1 ? 's' : ''}…`
      document.querySelector('#publishOverlay small').textContent = 'This usually takes 30–60 seconds per post'

      try {
        const res = await fetch('/api/blog/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: currentDate, articleIds: [...selectedIds] }),
        })
        let data
        try { data = await res.json() } catch { throw new Error(`Server error (${res.status}) — check Vercel function logs for details.`) }
        if (!res.ok) throw new Error(data.error || 'Publish failed')

        status.textContent = `✓ Published ${data.published} post${data.published !== 1 ? 's' : ''}!`
        const firstSlug = data.posts?.[0]?.slug
        const dest = firstSlug ? `/blog/post.html?slug=${encodeURIComponent(firstSlug)}` : '/blog/'
        setTimeout(() => { window.location.href = dest }, 2000)
      } catch (err) {
        overlay.classList.remove('visible')
        alert(`Error: ${err.message}`)
      }
    }

    document.getElementById('publishBtn').addEventListener('click', startImageReview)

    async function runDailyResearch() {
      const overlay = document.getElementById('publishOverlay')
      const status = document.getElementById('publishStatus')
      overlay.classList.add('visible')
      status.textContent = 'Running daily research…'
      document.querySelector('#publishOverlay small').textContent = 'Searching and scoring Coachella Valley news. Takes about 30–60 seconds.'

      try {
        const res = await fetch('/api/blog/run-research?type=daily', { method: 'POST' })
        let data
        try {
          data = await res.json()
        } catch {
          throw new Error(`Server error (${res.status}) — check Vercel logs for details.`)
        }
        if (!res.ok) throw new Error(data.error || 'Research failed')
        overlay.classList.remove('visible')
        // Reload articles now that research ran
        loadArticles().then(renderArticles).catch(() => {})
      } catch (err) {
        overlay.classList.remove('visible')
        alert(`Research error: ${err.message}`)
      }
    }

    loadArticles().then(renderArticles).catch((err) => {
      document.getElementById('loadingState').style.display = 'none'
      document.getElementById('articlesContainer').innerHTML = `
        <div class="state-msg">
          <h2>Couldn't load articles</h2>
          <p>${err.message}</p>
          <button class="run-research-btn" onclick="runDailyResearch()">
            ✦ Run Today's Research
          </button>
        </div>`
    })
  </script>
