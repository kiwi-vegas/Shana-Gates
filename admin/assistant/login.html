<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/images/favcon.png" />
  <title>Content Assistant — Shana Gates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .brand {
      color: #B8975A;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
    }
    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      margin-top: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: rgba(184,151,90,0.5);
    }
    input[type="password"]::placeholder {
      color: rgba(255,255,255,0.25);
    }
    .error {
      color: #ff6b6b;
      font-size: 13px;
      margin-bottom: 16px;
      margin-top: -8px;
      display: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #B8975A;
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="brand">Shana Gates &nbsp;·&nbsp; Craft &amp; Bauer</div>
      <h1>Content Assistant</h1>
      <p class="subtitle">Sign in to manage your site content</p>
    </div>
    <form id="loginForm">
      <input type="password" id="passwordInput" placeholder="Password" required autocomplete="current-password" />
      <p class="error" id="errorMsg"></p>
      <button type="submit" id="submitBtn">Sign In</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const input = document.getElementById('passwordInput');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/assistant/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
        });

        if (res.ok) {
          localStorage.setItem('sg_auth', '1');
          const hasAvatar = localStorage.getItem('sg_avatar');
          window.location.href = hasAvatar ? '/admin/assistant/' : '/admin/assistant/setup.html';
        } else {
          errorMsg.textContent = 'Incorrect password. Please try again.';
          errorMsg.style.display = 'block';
          input.value = '';
          input.focus();
        }
      } catch {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
